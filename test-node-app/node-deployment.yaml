apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-node-app
  namespace: test
  labels:
    app: test-node-app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: test-node-app
  replicas: 3
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: test-node-app
    spec:
      containers:
        - name: test-node-app
          image: "10.0.0.34:8082/test-images/test-node-app:1.0"
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: test-node-app
      imagePullSecrets:
        - name: harbor-pull-secret
